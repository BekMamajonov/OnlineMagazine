{% extends 'base.html' %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    body { 
        background-color: #0f172a; 
        color: white; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .main-container {
        max-width: 900px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 40px;
        backdrop-filter: blur(10px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .img-box {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 350px;
    }
    .price-badge {
        background: #10b981;
        color: white;
        padding: 10px 20px;
        border-radius: 12px;
        display: inline-block;
        font-weight: bold;
    }
    .btn-buy {
        background: #6366f1;
        border: none;
        border-radius: 15px;
        padding: 18px;
        font-weight: bold;
        font-size: 1.1rem;
        transition: all 0.3s ease;
    }
    .btn-buy:hover {
        background: #4f46e5;
        transform: translateY(-3px);
    }
    /* Inputlar va Select dizayni */
    .form-control, .form-select {
        background: #1e293b !important;
        color: white !important;
        border: 1px solid #334155 !important;
        padding: 12px;
    }
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.5) !important;
    }

    /* Mashina animatsiyasi */
    @keyframes drive {
        0% { transform: translateX(-15px); opacity: 0; }
        50% { transform: translateX(0); opacity: 1; }
        100% { transform: translateX(15px); opacity: 0; }
    }
    .delivery-icon {
        font-size: 70px;
        color: #6366f1;
        animation: drive 1.5s infinite linear;
    }
</style>

<div class="container">
    <div class="main-container text-center">
        <a href="{% url 'product_list' %}" class="btn btn-sm btn-outline-light mb-4" 
           style="border-radius: 8px; opacity: 0.6; transition: 0.3s;">
            ← Orqaga qaytish
        </a>

        <div class="row g-5 align-items-center">
            <div class="col-md-6">
                <div class="img-box">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="img-fluid rounded shadow" style="max-height: 300px;">
                    {% else %}
                        <span class="text-white-50">Rasm yuklanmagan</span>
                    {% endif %}
                </div>
            </div>

            <div class="col-md-6 text-start">
                <h1 class="fw-bold mb-2">{{ product.name }}</h1>
                <div class="price-badge mb-4 fs-5">{{ product.price }} so'm</div>
                <p class="text-white-50 mb-5 lh-lg">{{ product.description }}</p>
                
                <div class="d-grid">
                    <button class="btn btn-primary btn-buy" data-bs-toggle="modal" data-bs-target="#buyModal">
                        Sotib olish
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="buyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white" style="border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal-header border-0 p-4 pb-0">
                <h4 class="modal-title fw-bold">Buyurtmani rasmiylashtirish</h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="modalBody">
                <form id="orderForm">
                    <div class="mb-3 text-start">
                        <label class="small text-white-50 mb-1">Karta raqami</label>
                        <input type="text" class="form-control" placeholder="8600 0000 0000 0000" 
                               maxlength="16" minlength="16" pattern="\d{16}" required>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="small text-white-50 mb-1">Telefon raqam</label>
                        <div class="input-group">
                            <select class="form-select" id="country-code" style="max-width: 130px; border-radius: 12px 0 0 12px;">
                                <option value="+998" selected>🇺🇿 +998</option>
                                <option value="+7">🇷🇺 +7</option>
                                <option value="+90">🇹🇷 +90</option>
                            </select>
                            <input type="tel" id="phone-input" class="form-control" placeholder="90 123 45 67" 
                                   required style="border-radius: 0 12px 12px 0;">
                        </div>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="small text-white-50 mb-1">Manzilingiz</label>
                        <textarea class="form-control" rows="2" placeholder="Viloyat, tuman, ko'cha..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3" style="background: #6366f1; border-radius: 12px; border: none;">
                        Tasdiqlash
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('phone-input');
    const countrySelect = document.getElementById('country-code');

    // Har bir davlat uchun alohida maskalar
    const masks = {
        '+998': { pattern: [2, 3, 2, 2], placeholder: '90 123 45 67' }, // O'zbekiston
        '+7': { pattern: [3, 3, 2, 2], placeholder: '900 123 45 67' },  // Rossiya
        '+90': { pattern: [3, 3, 2, 2], placeholder: '500 123 45 67' }  // Turkiya
    };

    // Davlat o'zgarganda placeholder va qiymatni yangilash
    countrySelect.addEventListener('change', function() {
        phoneInput.placeholder = masks[this.value].placeholder;
        phoneInput.value = ''; 
    });

    // Raqamlarni avtomatik formatlash (Maska)
    phoneInput.addEventListener('input', function (e) {
        const currentMask = masks[countrySelect.value].pattern;
        let value = e.target.value.replace(/\D/g, ''); 
        let formatted = '';
        let charCount = 0;

        for (let i = 0; i < currentMask.length; i++) {
            if (value.length > charCount) {
                if (formatted.length > 0) formatted += ' ';
                formatted += value.substring(charCount, charCount + currentMask[i]);
                charCount += currentMask[i];
            }
        }
        e.target.value = formatted;
    });

    // Formani yuborish va rahmat oynasi
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('modalBody').innerHTML = `
            <div class="text-center p-4">
                <div class="mb-4">
                    <i class="fas fa-truck-fast delivery-icon"></i>
                </div>
                <h3 class="fw-bold mb-3">Xaridingiz uchun rahmat!</h3>
                <p class="text-white-50 mb-4">Sizning buyurtmangiz qabul qilindi. 12 soat ichida manzilingizga yetkazib beriladi.</p>
                <button type="button" class="btn btn-light btn-sm px-4 py-2 fw-bold" data-bs-dismiss="modal" style="border-radius: 10px;">Yopish</button>
            </div>`;
    };
</script>
{% endblock %}
