{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 50px auto;
        padding: 40px;
        background: #1f293a;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        color: white;
        text-align: center;
    }
    .auth-logo {
        width: 60px;
        height: 60px;
        background: #323c52;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 24px;
    }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; margin-bottom: 8px; color: #a0a0a0; }
    .form-group input { 
        width: 100%; 
        padding: 12px; 
        border-radius: 8px; 
        border: none; 
        background: #e8f0fe;
        color: #333;
        box-sizing: border-box;
    }
    .auth-btn {
        width: 100%;
        padding: 14px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .auth-link { margin-top: 20px; color: #a0a0a0; font-size: 14px; }
    .auth-link a { color: #6366f1; text-decoration: none; font-weight: bold; }
    

    .message {
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        font-size: 14px;
        background: rgba(255, 0, 0, 0.1);
        color: #ff4d4d;
        border: 1px solid #ff4d4d;
    }
</style>

<div class="auth-container">
    <div class="auth-logo">👤</div>
    <h2>PRO-SHOP</h2>
    <p style="color: #a0a0a0; margin-bottom: 25px;">Ro'yxatdan o'ting</p>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Parol</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Parolni tasdiqlash</label>
            <input type="password" name="password_confirm" required>
        </div>
        <button type="submit" class="auth-btn">RO'YXATDAN O'TISH</button>
    </form>

    <div class="auth-link">
        Akkauntingiz bormi? <a href="{% url 'login' %}">Kirish</a>
    </div>
</div>
{% endblock %}
