<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Pro-Shop | Login</title>
    <style>
        body { background-color: #1a2236; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .login-card { background-color: #242f48; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; text-align: center; }
        .icon-circle { background-color: #38445e; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 25px; }
        h2 { margin-bottom: 5px; letter-spacing: 2px; }
        p { color: #8e99af; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #8e99af; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background-color: #e8f0fe; box-sizing: border-box; color: #1a2236; outline: none; }
        button { width: 100%; padding: 12px; background-color: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        button:hover { background-color: #4f46e5; }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-bottom: 15px; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 5px; }
        
        .register-link { margin-top: 25px; font-size: 14px; color: #8e99af; }
        .register-link a { color: #6366f1; text-decoration: none; font-weight: bold; }
        .register-link a:hover { text-decoration: underline; color: #818cf8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-circle">🔒</div>
        <h2>PRO-SHOP</h2>
        <p>Tizimga kiring</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Loginni yozing">
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" required placeholder="********">
            </div>
            <button type="submit">KIRISH</button>
        </form>
        
        <div class="register-link">
            Akkountingiz yo'qmi? <br>
            <a href="{% url 'register' %}">Ro'yxatdan o'ting</a>
        </div>
        
    </div>
</body>
</html>
